<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Docketwise API Tester</title>
    <style>
        body { font-family: Arial, sans-serif; background: #f5f2eb; display: flex; justify-content: center; padding-top: 50px; }
        .box { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 400px; }
        input { width: 100%; padding: 10px; margin-bottom: 15px; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: #1976d2; color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; }
        button:hover { background: #0d47a1; }
        pre { background: #222; color: #0f0; padding: 15px; border-radius: 6px; overflow-x: auto; font-size: 12px; }
    </style>
</head>
<body>

<div class="box">
    <h2>🧪 Create Lead Tester</h2>
    <label>First Name:</label>
    <input type="text" id="tFirst" placeholder="e.g. Test">
    
    <label>Last Name:</label>
    <input type="text" id="tLast" placeholder="e.g. User">
    
    <label>Phone Number:</label>
    <input type="text" id="tPhone" placeholder="e.g. 8185551234">
    
    <button onclick="sendTestLead()" id="tBtn">Send to Docketwise</button>

    <h3 style="margin-top: 20px;">Server Response:</h3>
    <pre id="tResult">Waiting for input...</pre>
</div>

<script>
    async function sendTestLead() {
        const btn = document.getElementById('tBtn');
        const resultBox = document.getElementById('tResult');
        
        btn.textContent = "Sending...";
        btn.disabled = true;
        resultBox.textContent = "Loading...";

        const payload = {
            first_name: document.getElementById('tFirst').value,
            last_name: document.getElementById('tLast').value,
            phone: document.getElementById('tPhone').value
        };

        try {
            const response = await fetch('/api/create-dw-contact', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });
            
            const data = await response.json();
            
            // Выводим сырой JSON-ответ прямо на экран
            resultBox.textContent = JSON.stringify(data, null, 2);
        } catch (error) {
            resultBox.textContent = "Network Error: " + error.message;
        } finally {
            btn.textContent = "Send to Docketwise";
            btn.disabled = false;
        }
    }
</script>

</body>
</html>
